[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line length -- long prompt strings / URLs are common here, not worth hard-wrapping
]

[tool.ruff.lint.per-file-ignores]
# Legacy/exploratory scripts predating insight_engine.py (see CLAUDE.md) --
# not touching their style, just keeping them importable/parseable.
"absa_pipeline.py" = ["F401", "B"]
"pyabsa_pipeline.py" = ["F401", "B"]
"eda_analysis.py" = ["F401", "B", "E402", "I001"]  # imports intentionally follow a dependency check
"generate_annotation_batch.py" = ["F401", "B"]
"annotate_cli.py" = ["F401", "B"]
