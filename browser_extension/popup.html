<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Amazon Ürün İçgörü Aracı</title>
<style>
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    width: 380px;
    padding: 14px;
    color: #0b0b0b;
    background: #fcfcfb;
  }
  h3 { margin: 0 0 10px 0; font-size: 15px; }
  button {
    background: #d03b3b;
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    width: 100%;
  }
  button:disabled { background: #c3c2b7; cursor: not-allowed; }
  .force-refresh {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #52514e;
    margin-top: 6px;
    cursor: pointer;
  }
  .force-refresh input { margin: 0; cursor: pointer; }
  #status {
    font-size: 12px;
    color: #52514e;
    margin-top: 10px;
    white-space: pre-wrap;
    font-family: ui-monospace, monospace;
  }
  #result { margin-top: 12px; font-size: 13px; line-height: 1.5; }
  .metrics { display: flex; gap: 20px; margin: 8px 0 12px 0; }
  .metric b { font-size: 20px; display: block; }
  .metric span { font-size: 11px; color: #52514e; }
  .insight {
    background: #f9f9f7;
    border: 1px solid #e1e0d9;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .pos { color: #0ca30c; font-weight: 600; }
  .neu { color: #898781; font-weight: 600; }
  .neg { color: #d03b3b; font-weight: 600; }

  .chart-legend {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: #52514e;
    margin: 10px 0 6px 0;
  }
  .chart-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .aspect-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
  }
  .aspect-label {
    width: 76px;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .aspect-track {
    flex: 1;
    height: 14px;
    border-radius: 3px;
    overflow: hidden;
    background: #e1e0d9;
  }
  .aspect-bar { height: 100%; display: flex; }
  .bar-segment { height: 100%; }
  .bar-segment.pos { background: #0ca30c; }
  .bar-segment.neu { background: #898781; }
  .bar-segment.neg { background: #d03b3b; }
  .bar-segment + .bar-segment { border-left: 1px solid #fcfcfb; }
  .aspect-total {
    width: 18px;
    font-size: 11px;
    color: #52514e;
    text-align: right;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <h3>🔍 Amazon Ürün İçgörü Aracı</h3>
  <button id="analyzeBtn">Bu Ürünü Analiz Et</button>
  <label class="force-refresh">
    <input type="checkbox" id="forceRefresh" />
    Cache'i atla, yeniden analiz et
  </label>
  <div id="status"></div>
  <div id="result"></div>
  <script src="render.js"></script>
  <script src="popup.js"></script>
</body>
</html>
